services:
  backend:
    build: ./backend
    container_name: spam_ham_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    container_name: spam_ham_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
